<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LifePilot</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="top">
        <p class="brand">LifePilot</p>
        <h1>Paste scrambled notes, gain clarity</h1>
        <div class="mini-stats" aria-label="Saved review stats">
          <span><strong id="reviewCount">0</strong> saved</span>
          <span id="mainFocus">None yet</span>
        </div>
      </header>

      <section class="board">
        <section class="panel notes-panel" aria-labelledby="notesTitle">
          <div class="panel-head">
            <h2 id="notesTitle">Notes</h2>
            <button class="button small" type="button" id="exampleButton">Example</button>
          </div>

          <textarea id="noteInput" rows="14" placeholder="Paste messy notes, thoughts, plans, or ideas here..."></textarea>

          <div class="controls">
            <label>
              Context
              <input id="contextInput" type="text" placeholder="Optional">
            </label>
            <label>
              Style
              <select id="styleInput">
                <option value="practical">Practical</option>
                <option value="coach">Coach</option>
                <option value="founder">Founder</option>
              </select>
            </label>
          </div>

          <div class="actions">
            <button class="button primary" type="button" id="analyzeButton">Analyze Notes</button>
            <button class="button" type="button" id="freshButton">New</button>
          </div>
        </section>

        <section class="panel output-panel" aria-labelledby="outputTitle">
          <div class="panel-head">
            <h2 id="outputTitle">Advice / Output from the AI</h2>
            <span class="pill" id="confidencePill">AI review</span>
          </div>

          <div class="empty-review" id="emptyReview">
            <p>Your AI advice will appear here.</p>
          </div>

          <article class="review" id="reviewOutput" hidden>
            <div class="review-head">
              <p class="eyebrow" id="reviewType">Review</p>
              <h3 id="reviewTitle"></h3>
            </div>

            <section class="takeaway">
              <h4>Main Advice</h4>
              <p id="mainTakeaway"></p>
            </section>

            <section class="summary">
              <h4>Summary</h4>
              <p id="cleanSummary"></p>
            </section>
          </article>
        </section>
      </section>

      <details class="details-drawer">
        <summary>Details</summary>

        <div class="details-grid">
          <section class="detail-card">
            <h2>Themes</h2>
            <div class="chip-row" id="themeChips"></div>
          </section>

          <section class="detail-card">
            <h2>Next Steps</h2>
            <ol id="nextSteps"></ol>
          </section>

          <section class="detail-card">
            <h2>Watch-outs</h2>
            <ul id="risksList"></ul>
          </section>

          <section class="detail-card">
            <h2>Questions</h2>
            <ul id="questionsList"></ul>
          </section>

          <section class="detail-card wide">
            <h2>Organized Details</h2>
            <div class="bucket-grid" id="bucketGrid"></div>
          </section>

          <section class="detail-card wide">
            <div class="history-top">
              <h2>Saved Reviews</h2>
              <button class="button subtle" type="button" id="clearHistory">Clear</button>
            </div>
            <div class="history-list" id="historyList"></div>
          </section>
        </div>
      </details>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <template id="historyTemplate">
      <article class="history-card">
        <button class="history-main" type="button">
          <span class="history-type"></span>
          <strong></strong>
          <p></p>
        </button>
        <button class="delete-review" type="button">Delete</button>
      </article>
    </template>

    <script defer src="app.js"></script>
  </body>
</html>
